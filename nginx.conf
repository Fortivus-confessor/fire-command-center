server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: qualquer rota não encontrada em disco cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agressivo para assets com hash (nunca mudam)
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sem cache para index.html (sempre verifica nova versão)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Compressão gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/x-javascript;
    gzip_min_length 1024;
}
